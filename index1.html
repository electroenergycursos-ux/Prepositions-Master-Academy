<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prepositions Master Academy</title>
    <style>
        /* --- ESTILOS VISUALES (CSS) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #102a43;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 550px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #1982fc;
            margin-bottom: 5px;
            font-size: 26px;
        }

        .subtitle {
            color: #627d98;
            margin-bottom: 25px;
            font-size: 15px;
        }

        /* El Triángulo Visual del Día 1 */
        .triangle-container {
            margin: 20px auto 30px auto;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 240px solid #f0f4f8;
            position: relative;
        }

        .triangle-zone {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            color: white;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 14px;
        }

        .zone-in { top: -220px; background-color: #ff4757; width: 180px; }
        .zone-on { top: -140px; background-color: #ffa502; width: 110px; }
        .zone-at { top: -60px; background-color: #2ed573; width: 50px; }

        /* Cuadro de Preguntas */
        .quiz-card {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .question {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            background-color: #ffffff;
            border: 2px solid #cbd5e1;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #1982fc;
            color: white;
            border-color: #1982fc;
        }

        .feedback {
            margin-top: 15px;
            font-weight: 600;
            min-height: 24px;
        }

        .correct { color: #2ed573; }
        .incorrect { color: #ff4757; }

        .progress {
            margin-top: 20px;
            font-size: 13px;
            color: #627d98;
        }

        .hidden { display: none; }

        .btn-restart {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📐 Prepositions Master</h1>
        <div class="subtitle">Plan de 7 días: Tiempo, Espacio y Movimiento</div>

        <div id="visual-triangle">
            <div style="position: relative; height: 250px; margin-bottom: 10px;">
                <div class="triangle-container"></div>
                <div class="triangle-zone zone-in">IN (General / Grande)</div>
                <div class="triangle-zone zone-on">ON (Superficies)</div>
                <div class="triangle-zone zone-at">AT (Puntual)</div>
            </div>
        </div>

        <div id="quiz-screen">
            <div class="quiz-card">
                <div class="question" id="question-text">Cargando desafío...</div>
                <div class="options-grid" id="options-box"></div>
            </div>
            <div class="feedback" id="feedback-text"></div>
            <div class="progress" id="progress-text">Pregunta 1 de X</div>
        </div>

        <div id="result-screen" class="hidden">
            <h2>¡Día completado! 🎉</h2>
            <p id="final-score-text">Dominaste X de X conceptos hoy.</p>
            <p style="color: #627d98; font-size: 14px;">El subconsciente fijará esto mientras duermes.</p>
            <button class="btn-restart" onclick="restartQuiz()">Volver a practicar</button>
        </div>
    </div>

    <script>
        // Banco de preguntas estructurado según el plan de 7 días
        const quizData = [
            // Día 1: IN, ON, AT
            {
                question: "I live ________ Orlando, Florida.",
                options: ["in", "on", "at", "to"],
                correct: "in",
                explanation: "¡Correcto! Usamos 'IN' para ciudades y regiones geográficas grandes."
            },
            {
                question: "The important meeting starts ________ 8:00 PM sharp.",
                options: ["in", "on", "at", "for"],
                correct: "at",
                explanation: "¡Excelente! 'AT' se usa para horas específicas del reloj."
            },
            {
                question: "I have a special training session ________ Monday morning.",
                options: ["in", "on", "at", "by"],
                correct: "on",
                explanation: "¡Así es! Usamos 'ON' para días específicos de la semana."
            },
            // Día 2: TO vs FOR
            {
                question: "I am traveling ________ Medellín next month for a conference.",
                options: ["to", "for", "at", "in"],
                correct: "to",
                explanation: "¡Bien pensado! 'TO' indica movimiento, destino o dirección."
            },
            // Día 4: Límite de entrega (BY)
            {
                question: "Please, send me the technical report ________ Friday.",
                options: ["until", "by", "during", "to"],
                correct: "by",
                explanation: "¡Perfecto! 'BY' significa 'a más tardar en' (fecha límite)."
            }
        ];

        let currentIndex = 0;
        let score = 0;

        const questionText = document.getElementById('question-text');
        const optionsBox = document.getElementById('options-box');
        const feedbackText = document.getElementById('feedback-text');
        const progressText = document.getElementById('progress-text');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const finalScoreText = document.getElementById('final-score-text');
        const visualTriangle = document.getElementById('visual-triangle');

        function startQuiz() {
            currentIndex = 0;
            score = 0;
            quizScreen.classList.remove('hidden');
            resultScreen.classList.add('hidden');
            visualTriangle.classList.remove('hidden');
            feedbackText.innerText = '';
            showQuestion();
        }

        function showQuestion() {
            optionsBox.innerHTML = '';
            feedbackText.innerText = '';
            
            let currentData = quizData[currentIndex];
            questionText.innerText = currentData.question;
            progressText.innerText = `Concepto ${currentIndex + 1} de ${quizData.length}`;

            // Ocultar el triángulo visual después del Día 1 (pregunta 3) para dar espacio a otros días
            if (currentIndex > 2) {
                visualTriangle.classList.add('hidden');
            } else {
                visualTriangle.classList.remove('hidden');
            }

            currentData.options.forEach(option => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('btn');
                button.onclick = () => checkAnswer(option, currentData.correct, currentData.explanation);
                optionsBox.appendChild(button);
            });
        }

        function checkAnswer(selected, correct, explanation) {
            // Deshabilitar botones temporalmente para mostrar la retroalimentación
            const buttons = optionsBox.querySelectorAll('.btn');
            buttons.forEach(b => b.disabled = true);

            if (selected === correct) {
                score++;
                feedbackText.innerHTML = `<span class="correct">✔ ${explanation}</span>`;
            } else {
                feedbackText.innerHTML = `<span class="incorrect">❌ La respuesta correcta era "${correct}".</span>`;
            }

            currentIndex++;

            setTimeout(() => {
                if (currentIndex < quizData.length) {
                    showQuestion();
                } else {
                    showResults();
                }
            }, 2500); // 2.5 segundos para leer la explicación antes de cambiar
        }

        function showResults() {
            quizScreen.classList.add('hidden');
            visualTriangle.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            finalScoreText.innerText = `Puntuación del día: ${score} de ${quizData.length} aciertos.`;
        }

        function restartQuiz() {
            startQuiz();
        }

        // Iniciar al cargar
        startQuiz();
    </script>
</body>
</html>
